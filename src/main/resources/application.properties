spring.application.name=teamtask

server.port=8080

#database (INFRA)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/team_task
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#jpa
spring.jpa.database=postgresql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type= trace

spring.jpa.properties.hibernate.jdbc.time_zone= UTC

#pagination (Evitar out of memory - ESTABILIDADE)
spring.data.web.pageable.max-page-size=25
spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size

#flyway
spring.flyway.create-schemas=true
spring.flyway.baseline-on-migrate=true

spring.jwt.expiration=7200000

